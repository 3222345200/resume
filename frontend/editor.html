<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>职跃 OfferPilot</title>
  <link rel="icon" type="image/svg+xml" href="/assets/brand-mark.svg" />
  <link rel="shortcut icon" href="/assets/brand-mark.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <div class="page-shell">
    <aside class="sidebar">
      <div class="brand-stack">
        <div class="brand-lockup">
          <img class="brand-logo" src="/assets/brand-mark.svg" alt="职跃 OfferPilot 标志" />
          <div>
            <p class="eyebrow">职跃 OfferPilot</p>
            <h1>求职工作台</h1>
          </div>
        </div>
        <p class="sidebar-copy">从简历编辑开始，逐步扩展到完整的求职材料与投递管理。</p>
        <p id="current-user" class="meta-text">未登录</p>
      </div>

      <button id="new-resume-btn" class="primary-button" type="button">新建简历</button>
      <button id="logout-btn" class="ghost-button" type="button">退出登录</button>

      <div class="resume-list-wrap">
        <div class="section-title-row">
          <h2>我的简历</h2>
          <span id="resume-count">0 份</span>
        </div>
        <div id="resume-list" class="resume-list"></div>
      </div>
    </aside>

    <main class="main-content">
      <section class="editor-panel card">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Editor</p>
            <h2>模板字段编辑</h2>
          </div>
          <div class="actions wrap-actions">
            <button id="save-btn" class="primary-button" type="button">保存简历</button>
            <button id="render-btn" class="ghost-button" type="button">生成 PDF</button>
            <a id="download-link" class="ghost-button hidden-link" target="_blank" rel="noopener">下载 PDF</a>
            <button id="delete-btn" class="ghost-button" type="button">删除</button>
          </div>
        </div>

        <form id="resume-form" class="form-grid">
          <label>
            标题
            <input id="title" name="title" placeholder="例如：Java 后端简历" required />
          </label>
          <label>
            模板
            <select id="template_id" name="template_id"></select>
          </label>

          <div class="full-width section-card" data-collapsible="true">
            <div class="section-title-row">
              <button type="button" class="section-toggle" aria-expanded="true">
                <span class="section-toggle-title">版式设置</span>
                <span class="section-toggle-chevron" aria-hidden="true"></span>
              </button>
            </div>
            <div class="section-card-body">
              <div class="form-grid nested-grid layout-grid">
                <p class="full-width field-note">这里控制 PDF 的整体版式，建议先调整字号和行距，再决定颜色，排版会更稳定。</p>
                <label>
                  模块标题字号
                  <select id="layout_section_title_size">
                    <option value="16">紧凑</option>
                    <option value="18">默认</option>
                    <option value="20">舒展</option>
                  </select>
                </label>
                <label>
                  正文字号
                  <select id="layout_content_font_size">
                    <option value="12.5">紧凑</option>
                    <option value="13.5">默认</option>
                    <option value="14.5">舒展</option>
                  </select>
                </label>
                <label>
                  正文行距
                  <select id="layout_content_line_height">
                    <option value="1.28">紧凑</option>
                    <option value="1.36">默认</option>
                    <option value="1.5">舒展</option>
                  </select>
                </label>
                <label>
                  标题下边距
                  <select id="layout_section_divider_gap">
                    <option value="2">紧凑</option>
                    <option value="4">默认</option>
                    <option value="6">舒展</option>
                  </select>
                </label>
                <div class="full-width layout-color-card">
                  <div class="layout-color-copy">
                    <strong>文字颜色</strong>
                    <span>建议使用深色，打印和 PDF 预览都会更稳定。</span>
                  </div>
                  <label class="layout-color-picker" for="layout_font_color">
                    <input id="layout_font_color" type="color" value="#111111" />
                    <span id="layout_font_color_value">#111111</span>
                  </label>
                </div>
              </div>
            </div>
          </div>


          <div class="full-width section-card" data-collapsible="true">
            <div class="section-title-row">
              <button type="button" class="section-toggle" aria-expanded="true">
                <span class="section-toggle-title">基础信息</span>
                <span class="section-toggle-chevron" aria-hidden="true"></span>
              </button>
            </div>
            <div class="section-card-body">
            <div class="nested-grid basics-layout">
              <div class="avatar-column">
                <div class="avatar-editor-wrap">
                  <div class="avatar-preview-wrap avatar-preview-frame">
                    <img
                      id="avatar-preview"
                      class="avatar-preview"
                      src="/assets/default-avatar.jpg"
                      alt="一寸照片预览"
                    />
                  </div>
                  <div class="avatar-frame-note">这里按照一寸照比例预览，生成 PDF 时会使用同样的裁切结果和固定尺寸。</div>
                </div>
                <div class="avatar-actions">
                  <label class="upload-label">
                    上传照片
                    <input id="avatar-file" type="file" accept="image/*" hidden />
                  </label>
                  <button id="avatar-clear" class="ghost-button" type="button">移除照片</button>
                  <div class="avatar-adjustments">
                    <label for="avatar-scale">
                      缩放
                      <input id="avatar-scale" type="range" min="1" max="3" step="0.01" value="1" />
                    </label>
                    <label for="avatar-offset-x">
                      左右位置
                      <input id="avatar-offset-x" type="range" min="0" max="100" step="1" value="50" />
                    </label>
                    <label for="avatar-offset-y">
                      上下位置
                      <input id="avatar-offset-y" type="range" min="0" max="100" step="1" value="50" />
                    </label>
                  </div>
                  <div id="avatar-status" class="avatar-status">未上传照片时，将使用默认占位图。</div>
                </div>
              </div>
              <div class="basics-fields form-grid">
                <label>姓名<input id="basics_name" /></label>
                <label>电话<input id="basics_phone" /></label>
                <label>邮箱<input id="basics_email" /></label>
                <label>城市<input id="basics_location" /></label>
                <label class="full-width">求职意向<input id="basics_job_target" placeholder="后端开发" /></label>
                <label class="full-width">
                  个人简介
                  <textarea id="basics_summary" rows="4" data-rich-text="true" data-rich-mode="paragraphs" placeholder="一句话介绍自己，突出方向和优势"></textarea>
                </label>
              </div>
            </div>
            </div>
          </div>

          <div class="full-width section-card" data-collapsible="true">
            <div class="section-title-row">
              <button type="button" class="section-toggle" aria-expanded="true">
                <span class="section-toggle-title">教育经历</span>
                <span class="section-toggle-chevron" aria-hidden="true"></span>
              </button>
              <button type="button" class="small-button" data-add-section="education">新增教育</button>
            </div>
            <div class="section-card-body">
              <div id="education-list" class="repeat-list"></div>
            </div>
          </div>
          <div class="full-width section-order-hint">Section order placeholder</div>

          <div id="sortable-sections" class="full-width sortable-sections">
            <div class="full-width section-card" data-collapsible="true" data-section-key="skills">
              <div class="section-title-row">
                <button type="button" class="section-toggle" aria-expanded="true">
                  <span class="section-toggle-title">skills</span>
                  <span class="section-toggle-chevron" aria-hidden="true"></span>
                </button>
                <div class="section-actions">
                  <div class="section-order-actions" aria-label="section-order">
                    <button type="button" class="icon-button" data-move-section="up" title="up" aria-label="up">&#8593;</button>
                    <button type="button" class="icon-button" data-move-section="down" title="down" aria-label="down">&#8595;</button>
                  </div>
                </div>
              </div>
              <div class="section-card-body">
                <label class="full-width">
                  skills field
                  <textarea id="skills" rows="5" data-rich-text="true" data-rich-mode="list" placeholder="skills placeholder"></textarea>
                </label>
              </div>
            </div>

            <div class="full-width section-card" data-collapsible="true" data-section-key="experience">
              <div class="section-title-row">
                <button type="button" class="section-toggle" aria-expanded="true">
                  <span class="section-toggle-title">experience</span>
                  <span class="section-toggle-chevron" aria-hidden="true"></span>
                </button>
                <div class="section-actions">
                  <div class="section-order-actions" aria-label="section-order">
                    <button type="button" class="icon-button" data-move-section="up" title="up" aria-label="up">&#8593;</button>
                    <button type="button" class="icon-button" data-move-section="down" title="down" aria-label="down">&#8595;</button>
                  </div>
                  <button type="button" class="small-button" data-add-section="experience">add</button>
                </div>
              </div>
              <div class="section-card-body">
                <div id="experience-list" class="repeat-list"></div>
              </div>
            </div>

            <div class="full-width section-card" data-collapsible="true" data-section-key="projects">
              <div class="section-title-row">
                <button type="button" class="section-toggle" aria-expanded="true">
                  <span class="section-toggle-title">projects</span>
                  <span class="section-toggle-chevron" aria-hidden="true"></span>
                </button>
                <div class="section-actions">
                  <div class="section-order-actions" aria-label="section-order">
                    <button type="button" class="icon-button" data-move-section="up" title="up" aria-label="up">&#8593;</button>
                    <button type="button" class="icon-button" data-move-section="down" title="down" aria-label="down">&#8595;</button>
                  </div>
                  <button type="button" class="small-button" data-add-section="projects">add</button>
                </div>
              </div>
              <div class="section-card-body">
                <div id="projects-list" class="repeat-list"></div>
              </div>
            </div>

            <div class="full-width section-card" data-collapsible="true" data-section-key="portfolio">
              <div class="section-title-row">
                <button type="button" class="section-toggle" aria-expanded="true">
                  <span class="section-toggle-title">portfolio</span>
                  <span class="section-toggle-chevron" aria-hidden="true"></span>
                </button>
                <div class="section-actions">
                  <div class="section-order-actions" aria-label="section-order">
                    <button type="button" class="icon-button" data-move-section="up" title="up" aria-label="up">&#8593;</button>
                    <button type="button" class="icon-button" data-move-section="down" title="down" aria-label="down">&#8595;</button>
                  </div>
                  <button type="button" class="small-button" data-add-section="portfolio">add</button>
                </div>
              </div>
              <div class="section-card-body">
                <div id="portfolio-list" class="repeat-list"></div>
              </div>
            </div>

            <div class="full-width section-card" data-collapsible="true" data-section-key="research">
              <div class="section-title-row">
                <button type="button" class="section-toggle" aria-expanded="true">
                  <span class="section-toggle-title">research</span>
                  <span class="section-toggle-chevron" aria-hidden="true"></span>
                </button>
                <div class="section-actions">
                  <div class="section-order-actions" aria-label="section-order">
                    <button type="button" class="icon-button" data-move-section="up" title="up" aria-label="up">&#8593;</button>
                    <button type="button" class="icon-button" data-move-section="down" title="down" aria-label="down">&#8595;</button>
                  </div>
                  <button type="button" class="small-button" data-add-section="research">add</button>
                </div>
              </div>
              <div class="section-card-body">
                <div id="research-list" class="repeat-list"></div>
              </div>
            </div>

            <div class="full-width section-card" data-collapsible="true" data-section-key="honors">
              <div class="section-title-row">
                <button type="button" class="section-toggle" aria-expanded="true">
                  <span class="section-toggle-title">honors</span>
                  <span class="section-toggle-chevron" aria-hidden="true"></span>
                </button>
                <div class="section-actions">
                  <div class="section-order-actions" aria-label="section-order">
                    <button type="button" class="icon-button" data-move-section="up" title="up" aria-label="up">&#8593;</button>
                    <button type="button" class="icon-button" data-move-section="down" title="down" aria-label="down">&#8595;</button>
                  </div>
                  <button type="button" class="small-button" data-add-section="honors">add</button>
                </div>
              </div>
              <div class="section-card-body">
                <div id="honors-list" class="repeat-list"></div>
              </div>
            </div>
          </div>
        </form>
      </section>

      <section class="preview-panel card">
        <div id="preview-empty" class="preview-empty">生成 PDF 后，这里会直接显示简历预览。</div>
        <iframe id="pdf-preview" class="pdf-preview hidden-preview" title="PDF Preview"></iframe>
      </section>
    </main>
  </div>

  <template id="education-template">
    <div class="repeat-item" data-section="education">
      <div class="section-title-row compact">
        <h4>教育条目</h4>
        <button type="button" class="text-button remove-btn">删除</button>
      </div>
      <div class="form-grid nested-grid">
        <label>学校<input data-field="school" /></label>
        <label>专业<input data-field="major" /></label>
        <label>
          学历
          <select data-field="degree">
            <option value="">请选择学历</option>
            <option value="专科">专科</option>
            <option value="本科">本科</option>
            <option value="硕士">硕士</option>
            <option value="博士">博士</option>
          </select>
        </label>
        <label>开始时间<select data-field="start_date" data-date-select="true"></select></label>
        <label>结束时间<select data-field="end_date" data-date-select="true" data-allow-present="true"></select></label>
        <label class="full-width">
          亮点
          <textarea rows="3" data-field="highlights" data-rich-text="true" data-rich-mode="list" placeholder="支持加粗、斜体、列表和链接"></textarea>
        </label>
      </div>
    </div>
  </template>

  <template id="experience-template">
    <div class="repeat-item" data-section="experience">
      <div class="section-title-row compact">
        <h4>经历条目</h4>
        <button type="button" class="text-button remove-btn">删除</button>
      </div>
      <div class="form-grid nested-grid">
        <label>
          经历类型
          <select data-field="entry_type">
            <option value="实习经历">实习经历</option>
            <option value="工作经历">工作经历</option>
          </select>
        </label>
        <label>公司<input data-field="company" /></label>
        <label>地点<input data-field="location" placeholder="北京" /></label>
        <label>部门<input data-field="department" placeholder="技术研发部" /></label>
        <label>岗位<input data-field="role" placeholder="后端开发工程师" /></label>
        <label>开始时间<select data-field="start_date" data-date-select="true"></select></label>
        <label>结束时间<select data-field="end_date" data-date-select="true" data-allow-present="true"></select></label>
        <label class="full-width">
          亮点
          <textarea rows="5" data-field="highlights" data-rich-text="true" data-rich-mode="list" placeholder="支持加粗、斜体、列表和链接"></textarea>
        </label>
      </div>
    </div>
  </template>

  <template id="projects-template">
    <div class="repeat-item" data-section="projects">
      <div class="section-title-row compact">
        <h4>项目条目</h4>
        <button type="button" class="text-button remove-btn">删除</button>
      </div>
      <div class="form-grid nested-grid">
        <label>项目名<input data-field="name" /></label>
        <label>项目描述<input data-field="description" placeholder="例如：企业级权限后台与数据分析平台" /></label>
        <label>开始时间<select data-field="start_date" data-date-select="true"></select></label>
        <label>结束时间<select data-field="end_date" data-date-select="true" data-allow-present="true"></select></label>
        <label class="full-width">
          主要工作
          <textarea rows="5" data-field="highlights" data-rich-text="true" data-rich-mode="list" placeholder="支持加粗、斜体、列表和链接"></textarea>
        </label>
      </div>
    </div>
  </template>

  <template id="research-template">
    <div class="repeat-item" data-section="research">
      <div class="section-title-row compact">
        <h4>科研条目</h4>
        <button type="button" class="text-button remove-btn">删除</button>
      </div>
      <div class="form-grid nested-grid">
        <label class="full-width">标题<input data-field="title" /></label>
        <label>标签<input data-field="label" placeholder="JSA 在投（二作）" /></label>
        <label class="full-width">简介<textarea rows="4" data-field="summary"></textarea></label>
      </div>
    </div>
  </template>

  <template id="portfolio-template">
    <div class="repeat-item" data-section="portfolio">
      <div class="section-title-row compact">
        <h4>作品条目</h4>
        <button type="button" class="text-button remove-btn">删除</button>
      </div>
      <div class="form-grid nested-grid">
        <label class="full-width">标题<input data-field="title" /></label>
        <label class="full-width">链接<input data-field="link" placeholder="https://github.com/yourname/project" /></label>
        <label class="full-width">
          简介
          <textarea rows="4" data-field="summary" data-rich-text="true" data-rich-mode="paragraphs" placeholder="可以填写作品亮点、职责和链接说明"></textarea>
        </label>
      </div>
    </div>
  </template>

  <template id="honors-template">
    <div class="repeat-item" data-section="honors">
      <div class="section-title-row compact">
        <h4>奖项条目</h4>
        <button type="button" class="text-button remove-btn">删除</button>
      </div>
      <div class="form-grid nested-grid">
        <label class="full-width">标题<input data-field="title" /></label>
        <label>标签<input data-field="label" placeholder="国家奖学金 / 竞赛一等奖" /></label>
        <label class="full-width">简介<textarea rows="4" data-field="summary"></textarea></label>
      </div>
    </div>
  </template>

  <script src="/assets/editor.js"></script>
</body>
</html>
